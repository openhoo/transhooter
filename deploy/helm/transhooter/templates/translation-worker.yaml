{{- if ne (int .Values.replicas.spoolDrainer) 1 -}}
{{- fail "spool-drainer requires exactly one replica" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transhooter.fullname" . }}-translation-worker
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.translationWorker }}
  selector:
    matchLabels:
      {{- include "transhooter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: translation-worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        transhooter.io/runtime-secret-revision: {{ .Values.rollout.runtimeSecretRevision | quote }}
        transhooter.io/provider-secret-revision: {{ .Values.rollout.providerSecretRevision | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "transhooter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: translation-worker
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ include "transhooter.fullname" . }}-translation-worker
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: translation-worker
          image: {{ include "transhooter.image" .Values.images.translationWorker | quote }}
          imagePullPolicy: {{ .Values.images.translationWorker.pullPolicy }}
          command: [transhooter-translation-worker, start]
          env:
            - {name: APP_ENV, value: {{ .Values.config.appEnv | quote }}}
            - {name: PROVIDER_PROFILE, value: {{ .Values.config.providerProfile | quote }}}
            {{- if eq .Values.config.providerProfile "google-eu" }}
            - {name: GOOGLE_APPLICATION_CREDENTIALS, value: /run/secrets/google-adc.json}
            - {name: GOOGLE_CLOUD_PROJECT, value: {{ .Values.config.providers.googleEu.cloudProject | quote }}}
            - {name: GOOGLE_QUOTA_PROJECT, value: {{ .Values.config.providers.googleEu.quotaProject | quote }}}
            - {name: GOOGLE_TTS_VOICE, value: {{ .Values.config.providers.googleEu.ttsVoice | quote }}}
            {{- else if eq .Values.config.providerProfile "google-speech-eu" }}
            - {name: GOOGLE_APPLICATION_CREDENTIALS, value: /run/secrets/google-adc.json}
            - {name: GOOGLE_CLOUD_PROJECT, value: {{ .Values.config.providers.googleSpeechEu.cloudProject | quote }}}
            - {name: GOOGLE_QUOTA_PROJECT, value: {{ .Values.config.providers.googleSpeechEu.quotaProject | quote }}}
            - {name: GOOGLE_SPEECH_LOCATION, value: {{ .Values.config.providers.googleSpeechEu.speechLocation | quote }}}
            - {name: GOOGLE_SPEECH_MODEL, value: {{ .Values.config.providers.googleSpeechEu.speechModel | quote }}}
            - {name: GOOGLE_TRANSLATION_LOCATION, value: {{ .Values.config.providers.googleSpeechEu.translationLocation | quote }}}
            - {name: GOOGLE_TRANSLATION_MODEL, value: {{ .Values.config.providers.googleSpeechEu.translationModel | quote }}}
            - {name: GOOGLE_TTS_LOCATION, value: {{ .Values.config.providers.googleSpeechEu.ttsLocation | quote }}}
            - {name: GOOGLE_TTS_VOICE, value: {{ .Values.config.providers.googleSpeechEu.ttsVoice | quote }}}
            - {name: GOOGLE_TTS_VOICE_LOCALE, value: {{ .Values.config.providers.googleSpeechEu.ttsVoiceLocale | quote }}}
            {{- else if eq .Values.config.providerProfile "deepgram-deepl-eu" }}
            - {name: DEEPGRAM_API_KEY_FILE, value: /run/secrets/deepgram-api-key}
            - {name: DEEPL_API_KEY_FILE, value: /run/secrets/deepl-api-key}
            - {name: DEEPGRAM_VOICE, value: {{ .Values.config.providers.deepgramDeeplEu.deepgramVoice | quote }}}
            - {name: DEEPGRAM_APPROVED_VOICES, value: {{ join "," .Values.config.providers.deepgramDeeplEu.deepgramApprovedVoices | quote }}}
            - {name: DEEPGRAM_STREAMS, value: {{ .Values.config.providers.deepgramDeeplEu.deepgramStreams | quote }}}
            - {name: DEEPGRAM_AUDIO_SECONDS_MINUTE, value: {{ .Values.config.providers.deepgramDeeplEu.deepgramAudioSecondsMinute | quote }}}
            - {name: DEEPL_REQUESTS_MINUTE, value: {{ .Values.config.providers.deepgramDeeplEu.deeplRequestsMinute | quote }}}
            - {name: DEEPL_CHARACTERS_MINUTE, value: {{ .Values.config.providers.deepgramDeeplEu.deeplCharactersMinute | quote }}}
            {{- end }}
            - {name: LIVEKIT_URL, value: {{ .Values.config.livekitUrl | quote }}}
            - {name: LIVEKIT_CREDENTIALS_FILE, value: /run/secrets/livekit-credentials}
            - {name: SPOOL_KEYRING_FILE, value: /run/secrets/spool-keyring}
            - {name: CONTROL_INTERNAL_URL, value: {{ printf "http://%s-web:%v" (include "transhooter.fullname" .) .Values.service.port | quote }}}
            - {name: INTERNAL_TOKEN_FILE, value: /var/run/secrets/transhooter/token}
            - {name: SPOOL_PATH, value: /var/lib/transhooter/spool}
            {{- if .Values.telemetry.enabled }}
            - {name: OTEL_EXPORTER_OTLP_ENDPOINT, value: {{ default (printf "http://%s-otel-collector:%v" (include "transhooter.fullname" .) .Values.telemetry.collector.ports.otlpHttp) .Values.telemetry.endpoint | quote }}}
            - {name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "http/protobuf"}
            - {name: OTEL_TRACES_SAMPLER, value: parentbased_traceidratio}
            - {name: OTEL_TRACES_SAMPLER_ARG, value: {{ .Values.telemetry.traceSampleRatio | quote }}}
            - {name: OTEL_METRIC_EXPORT_INTERVAL, value: {{ .Values.telemetry.metricExportIntervalMillis | quote }}}
            - {name: OTEL_RESOURCE_ATTRIBUTES, value: {{ printf "service.namespace=transhooter,deployment.environment.name=%s" .Values.config.appEnv | quote }}}
            - {name: OTEL_SERVICE_NAME, value: transhooter-translation-worker}
            {{- end }}
          readinessProbe: {exec: {command: [transhooter-worker-healthcheck]}, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 12}
          livenessProbe: {exec: {command: [transhooter-worker-healthcheck]}, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 6}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources:
            {{- toYaml .Values.resources.translationWorker | nindent 12 }}
          volumeMounts:
            - {name: runtime-secrets, mountPath: /run/secrets, readOnly: true}
            - {name: internal-token, mountPath: /var/run/secrets/transhooter, readOnly: true}
            - {name: spool, mountPath: /var/lib/transhooter/spool}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: runtime-secrets
          projected:
            sources:
              - secret:
                  name: {{ .Values.existingSecret }}
                  items:
                    - {key: livekit-credentials, path: livekit-credentials}
                    - {key: spool-keyring, path: spool-keyring}
              - secret:
                  name: {{ .Values.providerSecretName }}
                  items:
                    {{- range .Values.providerSecretKeys }}
                    - {key: {{ . | quote }}, path: {{ . | quote }}}
                    {{- end }}
        - name: internal-token
          projected:
            sources:
              - serviceAccountToken: {path: token, audience: {{ .Values.config.internalAudience | quote }}, expirationSeconds: 600}
        - name: spool
          persistentVolumeClaim: {claimName: {{ .Values.spool.existingClaim }}}
        - {name: tmp, emptyDir: {}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transhooter.fullname" . }}-spool-drainer
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.spoolDrainer }}
  selector:
    matchLabels:
      {{- include "transhooter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: spool-drainer
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        transhooter.io/runtime-secret-revision: {{ .Values.rollout.runtimeSecretRevision | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "transhooter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: spool-drainer
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ include "transhooter.fullname" . }}-spool-drainer
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: spool-drainer
          image: {{ include "transhooter.image" .Values.images.spoolDrainer | quote }}
          imagePullPolicy: {{ .Values.images.spoolDrainer.pullPolicy }}
          command: [transhooter-spool-drainer]
          env:
            - {name: APP_ENV, value: {{ .Values.config.appEnv | quote }}}
            - {name: S3_ENDPOINT, value: {{ .Values.config.s3Endpoint | quote }}}
            - {name: S3_REGION, value: {{ .Values.config.s3Region | quote }}}
            - {name: S3_BUCKET, value: {{ .Values.config.s3Bucket | quote }}}
            - {name: S3_KMS_KEY_ID, value: {{ .Values.config.s3KmsKeyId | quote }}}
            - {name: ARCHIVE_REQUIRE_KMS, value: {{ .Values.config.archiveRequireKms | quote }}}
            - {name: S3_CREDENTIALS_FILE, value: /run/secrets/s3-credentials}
            - {name: SPOOL_KEYRING_FILE, value: /run/secrets/spool-keyring}
            - {name: CONTROL_INTERNAL_URL, value: {{ printf "http://%s-web:%v" (include "transhooter.fullname" .) .Values.service.port | quote }}}
            - {name: SPOOL_PATH, value: /var/lib/transhooter/spool}
            - {name: INTERNAL_TOKEN_FILE, value: /var/run/secrets/transhooter/token}
            {{- if .Values.telemetry.enabled }}
            - {name: OTEL_EXPORTER_OTLP_ENDPOINT, value: {{ default (printf "http://%s-otel-collector:%v" (include "transhooter.fullname" .) .Values.telemetry.collector.ports.otlpHttp) .Values.telemetry.endpoint | quote }}}
            - {name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "http/protobuf"}
            - {name: OTEL_TRACES_SAMPLER, value: parentbased_traceidratio}
            - {name: OTEL_TRACES_SAMPLER_ARG, value: {{ .Values.telemetry.traceSampleRatio | quote }}}
            - {name: OTEL_METRIC_EXPORT_INTERVAL, value: {{ .Values.telemetry.metricExportIntervalMillis | quote }}}
            - {name: OTEL_RESOURCE_ATTRIBUTES, value: {{ printf "service.namespace=transhooter,deployment.environment.name=%s" .Values.config.appEnv | quote }}}
            - {name: OTEL_SERVICE_NAME, value: transhooter-spool-drainer}
            {{- end }}
          readinessProbe: {exec: {command: [transhooter-spool-drainer-healthcheck]}, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 12}
          livenessProbe: {exec: {command: [transhooter-spool-drainer-healthcheck]}, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 6}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources:
            {{- toYaml .Values.resources.spoolDrainer | nindent 12 }}
          volumeMounts:
            - {name: runtime-secrets, mountPath: /run/secrets, readOnly: true}
            - {name: internal-token, mountPath: /var/run/secrets/transhooter, readOnly: true}
            - {name: spool, mountPath: /var/lib/transhooter/spool}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: runtime-secrets
          secret:
            secretName: {{ .Values.existingSecret }}
            items:
              - {key: s3-credentials, path: s3-credentials}
              - {key: spool-keyring, path: spool-keyring}
        - name: internal-token
          projected:
            sources:
              - serviceAccountToken: {path: token, audience: {{ .Values.config.internalAudience | quote }}, expirationSeconds: 600}
        - name: spool
          persistentVolumeClaim: {claimName: {{ .Values.spool.existingClaim }}}
        - {name: tmp, emptyDir: {}}
---
