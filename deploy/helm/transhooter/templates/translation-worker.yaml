{{- $root := . -}}
{{- range $component, $replicas := dict "translation-worker" .Values.replicas.translationWorker "spool-drainer" .Values.replicas.spoolDrainer }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transhooter.fullname" $root }}-{{ $component }}
  labels:
    {{- include "transhooter.labels" $root | nindent 4 }}
spec:
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      {{- include "transhooter.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $root.Template.BasePath "/configmap.yaml") $root | sha256sum }}
        transhooter.io/runtime-secret-revision: {{ $root.Values.rollout.runtimeSecretRevision | quote }}
        {{- if eq $component "translation-worker" }}
        transhooter.io/provider-secret-revision: {{ $root.Values.rollout.providerSecretRevision | quote }}
        {{- end }}
        {{- with $root.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "transhooter.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ include "transhooter.fullname" $root }}-{{ $component }}
      imagePullSecrets:
        {{- toYaml $root.Values.imagePullSecrets | nindent 8 }}
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: {{ $component }}
          image: {{ include "transhooter.image" (ternary $root.Values.images.spoolDrainer $root.Values.images.translationWorker (eq $component "spool-drainer")) | quote }}
          imagePullPolicy: {{ (ternary $root.Values.images.spoolDrainer $root.Values.images.translationWorker (eq $component "spool-drainer")).pullPolicy }}
          {{- if eq $component "spool-drainer" }}
          command: [python, apps/spool-drainer/main.py]
          {{- else }}
          command: [python, apps/translation-worker/main.py, start]
          {{- end }}
          {{- if eq $component "spool-drainer" }}
          env:
            - {name: APP_ENV, value: {{ $root.Values.config.appEnv | quote }}}
            - {name: S3_ENDPOINT, value: {{ $root.Values.config.s3Endpoint | quote }}}
            - {name: S3_REGION, value: {{ $root.Values.config.s3Region | quote }}}
            - {name: S3_BUCKET, value: {{ $root.Values.config.s3Bucket | quote }}}
            - {name: S3_KMS_KEY_ID, value: {{ $root.Values.config.s3KmsKeyId | quote }}}
            - {name: ARCHIVE_REQUIRE_KMS, value: {{ $root.Values.config.archiveRequireKms | quote }}}
            - {name: S3_CREDENTIALS_FILE, value: /run/secrets/s3-credentials}
            - {name: SPOOL_KEYRING_FILE, value: /run/secrets/spool-keyring}
            - {name: CONTROL_INTERNAL_URL, value: {{ printf "http://%s-web:%v" (include "transhooter.fullname" $root) $root.Values.service.port | quote }}}
            - {name: SPOOL_PATH, value: /var/lib/transhooter/spool}
            - {name: INTERNAL_TOKEN_FILE, value: /var/run/secrets/transhooter/token}
          {{- else }}
          envFrom: [{configMapRef: {name: {{ include "transhooter.fullname" $root }}}}]
          env:
            - {name: INTERNAL_TOKEN_FILE, value: /var/run/secrets/transhooter/token}
            - {name: SPOOL_PATH, value: /var/lib/transhooter/spool}
          {{- end }}
            {{- if $root.Values.telemetry.enabled }}
            - {name: OTEL_EXPORTER_OTLP_ENDPOINT, value: {{ default (printf "http://%s-otel-collector:%v" (include "transhooter.fullname" $root) $root.Values.telemetry.collector.ports.otlpHttp) $root.Values.telemetry.endpoint | quote }}}
            - {name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "http/protobuf"}
            - {name: OTEL_TRACES_SAMPLER, value: parentbased_traceidratio}
            - {name: OTEL_TRACES_SAMPLER_ARG, value: {{ $root.Values.telemetry.traceSampleRatio | quote }}}
            - {name: OTEL_METRIC_EXPORT_INTERVAL, value: {{ $root.Values.telemetry.metricExportIntervalMillis | quote }}}
            - {name: OTEL_RESOURCE_ATTRIBUTES, value: {{ printf "service.namespace=transhooter,deployment.environment.name=%s" $root.Values.config.appEnv | quote }}}
            - {name: OTEL_SERVICE_NAME, value: {{ printf "transhooter-%s" $component | quote }}}
            {{- end }}
          {{- if eq $component "spool-drainer" }}
          readinessProbe: {exec: {command: [transhooter-spool-drainer-healthcheck]}, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 12}
          livenessProbe: {exec: {command: [transhooter-spool-drainer-healthcheck]}, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 6}
          {{- else }}
          readinessProbe: {exec: {command: [transhooter-worker-healthcheck]}, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 12}
          livenessProbe: {exec: {command: [transhooter-worker-healthcheck]}, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 6}
          {{- end }}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources:
            {{- toYaml $root.Values.resources.translationWorker | nindent 12 }}
          volumeMounts:
            - {name: runtime-secrets, mountPath: /run/secrets, readOnly: true}
            - {name: internal-token, mountPath: /var/run/secrets/transhooter, readOnly: true}
            - {name: spool, mountPath: /var/lib/transhooter/spool}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: runtime-secrets
          projected:
            sources:
              - secret:
                  name: {{ $root.Values.existingSecret }}
                  items:
                    {{- if eq $component "spool-drainer" }}
                    - {key: s3-credentials, path: s3-credentials}
                    - {key: spool-keyring, path: spool-keyring}
                    {{- else }}
                    - {key: database-url, path: database-url}
                    - {key: redis-url, path: redis-url}
                    - {key: livekit-credentials, path: livekit-credentials}
                    - {key: s3-credentials, path: s3-credentials}
                    - {key: spool-keyring, path: spool-keyring}
                    {{- end }}
              {{- if eq $component "translation-worker" }}
              - secret:
                  name: {{ $root.Values.providerSecretName }}
                  items:
                    {{- range $root.Values.providerSecretKeys }}
                    - {key: {{ . | quote }}, path: {{ . | quote }}}
                    {{- end }}
              {{- end }}
        - name: internal-token
          projected:
            sources:
              - serviceAccountToken: {path: token, audience: {{ $root.Values.config.internalAudience | quote }}, expirationSeconds: 600}
        - name: spool
          persistentVolumeClaim: {claimName: {{ $root.Values.spool.existingClaim }}}
        - {name: tmp, emptyDir: {}}
---
{{- end }}
