apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "transhooter.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-30"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: migrate
          image: {{ include "transhooter.image" .Values.images.controlWorker | quote }}
          imagePullPolicy: {{ .Values.images.controlWorker.pullPolicy }}
          command: [bun, deploy/scripts/migrate.mjs]
          envFrom: [{configMapRef: {name: {{ include "transhooter.fullname" . }}}}]
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: secrets, mountPath: /run/secrets, readOnly: true}, {name: tmp, mountPath: /tmp}]
      volumes:
        - name: secrets
          secret:
            secretName: {{ .Values.existingSecret }}
            items: [{key: database-url, path: database-url}]
        - {name: tmp, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "transhooter.fullname" . }}-capability-publisher
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
    app.kubernetes.io/component: capability-publisher
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-25"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  selector:
    {{- include "transhooter.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: capability-publisher
  ports: [{name: http, port: {{ .Values.service.port }}, targetPort: http}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transhooter.fullname" . }}-capability-publisher
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
    app.kubernetes.io/component: capability-publisher
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-25"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "transhooter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: capability-publisher
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        transhooter.io/runtime-secret-revision: {{ .Values.rollout.runtimeSecretRevision | quote }}
      labels:
        {{- include "transhooter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: capability-publisher
    spec:
      automountServiceAccountToken: false
      serviceAccountName: capability-publisher
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: capability-publisher
          image: {{ include "transhooter.image" .Values.images.web | quote }}
          imagePullPolicy: {{ .Values.images.web.pullPolicy }}
          command: [bun, apps/web/server.js]
          envFrom: [{configMapRef: {name: {{ include "transhooter.fullname" . }}}}]
          env:
            - name: POD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: SESSION_SECRET_FILE, value: /run/secrets/session-secret}
            - {name: CSRF_SECRET_FILE, value: /run/secrets/csrf-secret}
            - {name: EGRESS_LAYOUT_SIGNING_KEY_FILE, value: /run/secrets/egress-layout-signing-key}
            - {name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes/ca.crt}
          ports: [{name: http, containerPort: 3000}]
          readinessProbe: {httpGet: {path: /api/health/live, port: http}, periodSeconds: 2, timeoutSeconds: 2, failureThreshold: 60}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources: {{- toYaml .Values.resources.web | nindent 12 }}
          volumeMounts:
            - {name: runtime-secrets, mountPath: /run/secrets, readOnly: true}
            - {name: kubernetes-ca, mountPath: /var/run/secrets/kubernetes, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: runtime-secrets
          secret:
            secretName: {{ .Values.existingSecret }}
            items:
              - {key: database-url, path: database-url}
              - {key: redis-url, path: redis-url}
              - {key: livekit-credentials, path: livekit-credentials}
              - {key: s3-credentials, path: s3-credentials}
              - {key: smtp-url, path: smtp-url}
              - {key: session-secret, path: session-secret}
              - {key: csrf-secret, path: csrf-secret}
              - {key: egress-layout-signing-key, path: egress-layout-signing-key}
        - name: kubernetes-ca
          configMap:
            name: kube-root-ca.crt
            items: [{key: ca.crt, path: ca.crt}]
        - {name: tmp, emptyDir: {}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "transhooter.fullname" . }}-language-refresh-{{ .Release.Revision }}
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      serviceAccountName: language-refresh
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: language-refresh
          image: {{ include "transhooter.image" .Values.images.translationWorker | quote }}
          imagePullPolicy: {{ .Values.images.translationWorker.pullPolicy }}
          command: [/bin/sh, -ec]
          args:
            - |
              python -m transhooter_worker.providers sync
              python - <<'PY'
              import os
              import ssl
              import urllib.error
              import urllib.request

              host = os.environ["KUBERNETES_SERVICE_HOST"]
              port = os.environ["KUBERNETES_SERVICE_PORT_HTTPS"]
              namespace = os.environ["POD_NAMESPACE"]
              name = os.environ["CAPABILITY_PUBLISHER_NAME"]
              token = open("/var/run/secrets/kubernetes/token", encoding="utf-8").read().strip()
              context = ssl.create_default_context(cafile="/var/run/secrets/kubernetes/ca.crt")
              paths = (
                  f"/apis/apps/v1/namespaces/{namespace}/deployments/{name}",
                  f"/api/v1/namespaces/{namespace}/services/{name}",
              )
              for path in paths:
                  request = urllib.request.Request(
                      f"https://{host}:{port}{path}",
                      method="DELETE",
                      headers={"Authorization": f"Bearer {token}"},
                  )
                  try:
                      urllib.request.urlopen(request, context=context, timeout=10).close()
                  except urllib.error.HTTPError as error:
                      if error.code != 404:
                          raise
              PY
          envFrom: [{configMapRef: {name: {{ include "transhooter.fullname" . }}}}]
          env:
            - name: CAPABILITY_PUBLISH_URL
              value: {{ printf "http://%s-capability-publisher:%v/api/internal/capabilities" (include "transhooter.fullname" .) .Values.service.port | quote }}
            - {name: INTERNAL_TOKEN_FILE, value: /var/run/secrets/transhooter/token}
            - name: POD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: CAPABILITY_PUBLISHER_NAME, value: {{ printf "%s-capability-publisher" (include "transhooter.fullname" .) | quote }}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts:
            - {name: secrets, mountPath: /run/secrets, readOnly: true}
            - {name: internal-token, mountPath: /var/run/secrets/transhooter, readOnly: true}
            - {name: kubernetes-api-token, mountPath: /var/run/secrets/kubernetes, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: secrets
          projected:
            sources:
              - secret:
                  name: {{ .Values.existingSecret }}
                  items: [{key: database-url, path: database-url}]
              - secret:
                  name: {{ .Values.providerSecretName }}
                  items:
                    {{- range .Values.providerSecretKeys }}
                    - {key: {{ . | quote }}, path: {{ . | quote }}}
                    {{- end }}
        - name: internal-token
          projected:
            sources:
              - serviceAccountToken: {path: token, audience: {{ .Values.config.internalAudience | quote }}, expirationSeconds: 600}
        - name: kubernetes-api-token
          projected:
            sources:
              - serviceAccountToken: {path: token, audience: {{ .Values.config.kubernetesApiAudience | quote }}, expirationSeconds: 600}
              - configMap:
                  name: kube-root-ca.crt
                  items: [{key: ca.crt, path: ca.crt}]
        - {name: tmp, emptyDir: {}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "transhooter.fullname" . }}-bootstrap-admin-{{ .Release.Revision }}
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: bootstrap-admin
          image: {{ include "transhooter.image" .Values.images.controlWorker | quote }}
          imagePullPolicy: {{ .Values.images.controlWorker.pullPolicy }}
          command: [/bin/sh, -ec]
          args:
            - exec bun run admin:create-staff --email "$(cat /run/secrets/bootstrap-admin-email)" --name "$BOOTSTRAP_ADMIN_NAME" --role admin
          envFrom: [{configMapRef: {name: {{ include "transhooter.fullname" . }}}}]
          env: [{name: BOOTSTRAP_ADMIN_NAME, value: {{ .Values.config.bootstrapAdminName | quote }}}]
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: secrets, mountPath: /run/secrets, readOnly: true}, {name: tmp, mountPath: /tmp}]
      volumes:
        - name: secrets
          secret:
            secretName: {{ .Values.existingSecret }}
            items: [{key: database-url, path: database-url}, {key: bootstrap-admin-email, path: bootstrap-admin-email}]
        - {name: tmp, emptyDir: {}}
