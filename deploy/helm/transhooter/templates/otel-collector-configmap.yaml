{{- if and .Values.telemetry.enabled .Values.telemetry.collector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: transhooter-otel-collector
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.telemetry.collector.ports.otlpGrpc }}
          http:
            endpoint: 0.0.0.0:{{ .Values.telemetry.collector.ports.otlpHttp }}
      prometheus:
        config:
          scrape_configs:
            - job_name: livekit-egress
              scrape_interval: 15s
              static_configs:
                - targets:
                    - {{ printf "%s-egress-metrics:9090" (include "transhooter.fullname" .) | quote }}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 384
        spike_limit_mib: 96
      batch:
        timeout: 5s
        send_batch_size: 1024
        send_batch_max_size: 2048
    exporters:
      prometheus:
        endpoint: 0.0.0.0:{{ .Values.telemetry.collector.ports.prometheus }}
      debug:
        verbosity: basic
    extensions:
      health_check:
        endpoint: 0.0.0.0:{{ .Values.telemetry.collector.ports.health }}
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
{{- end }}
