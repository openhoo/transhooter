apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transhooter.fullname" . }}-control
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.controlWorker }}
  selector:
    matchLabels:
      {{- include "transhooter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-worker
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "transhooter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-worker
    spec:
      automountServiceAccountToken: false
      serviceAccountName: control-worker
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: control-worker
          image: {{ include "transhooter.image" .Values.images.controlWorker | quote }}
          imagePullPolicy: {{ .Values.images.controlWorker.pullPolicy }}
          command: [bun, run, --filter, "@transhooter/control-worker", start]
          envFrom: [{configMapRef: {name: {{ include "transhooter.fullname" . }}}}]
          env:
            - {name: INTERNAL_TOKEN_FILE, value: /var/run/secrets/transhooter/token}
            - {name: INSTANCE_ID, valueFrom: {fieldRef: {fieldPath: metadata.uid}}}
            - {name: EGRESS_LAYOUT_SIGNING_KEY_FILE, value: /run/secrets/egress-layout-signing-key}
          ports: [{name: health, containerPort: 8080}]
          readinessProbe: {httpGet: {path: /health/ready, port: health}, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 12}
          livenessProbe: {httpGet: {path: /health/live, port: health}, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 6}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources:
            {{- toYaml .Values.resources.controlWorker | nindent 12 }}
          volumeMounts:
            - {name: runtime-secrets, mountPath: /run/secrets, readOnly: true}
            - {name: internal-token, mountPath: /var/run/secrets/transhooter, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: runtime-secrets
          secret:
            secretName: {{ .Values.existingSecret }}
            items:
              - {key: database-url, path: database-url}
              - {key: redis-url, path: redis-url}
              - {key: livekit-credentials, path: livekit-credentials}
              - {key: s3-credentials, path: s3-credentials}
              - {key: smtp-url, path: smtp-url}
              - {key: egress-layout-signing-key, path: egress-layout-signing-key}
        - name: internal-token
          projected:
            sources:
              - serviceAccountToken: {path: token, audience: {{ .Values.config.internalAudience | quote }}, expirationSeconds: 600}
        - {name: tmp, emptyDir: {}}
