apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "transhooter.fullname" . }}
  labels:
    {{- include "transhooter.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  PROVIDER_PROFILE: {{ .Values.config.providerProfile | quote }}
  {{- if eq .Values.config.providerProfile "google-eu" }}
  GOOGLE_APPLICATION_CREDENTIALS: "/run/secrets/google-adc.json"
  GOOGLE_CLOUD_PROJECT: {{ .Values.config.providers.googleEu.cloudProject | quote }}
  GOOGLE_QUOTA_PROJECT: {{ .Values.config.providers.googleEu.quotaProject | quote }}
  GOOGLE_SPEECH_ENDPOINT: {{ .Values.config.providers.googleEu.speechEndpoint | quote }}
  GOOGLE_SPEECH_RECOGNIZER: {{ .Values.config.providers.googleEu.speechRecognizer | quote }}
  GOOGLE_SPEECH_MODEL: {{ .Values.config.providers.googleEu.speechModel | quote }}
  GOOGLE_TRANSLATION_ENDPOINT: {{ .Values.config.providers.googleEu.translationEndpoint | quote }}
  GOOGLE_TRANSLATION_PARENT: {{ .Values.config.providers.googleEu.translationParent | quote }}
  GOOGLE_TRANSLATION_MODEL: {{ .Values.config.providers.googleEu.translationModel | quote }}
  GOOGLE_TTS_ENDPOINT: {{ .Values.config.providers.googleEu.ttsEndpoint | quote }}
  GOOGLE_TTS_MODEL: {{ .Values.config.providers.googleEu.ttsModel | quote }}
  GOOGLE_TTS_VOICE: {{ .Values.config.providers.googleEu.ttsVoice | quote }}
  GOOGLE_STT_STREAMS: {{ .Values.config.providers.googleEu.sttStreams | quote }}
  GOOGLE_STT_MESSAGES_MINUTE: {{ .Values.config.providers.googleEu.sttMessagesMinute | quote }}
  GOOGLE_TRANSLATION_REQUESTS_MINUTE: {{ .Values.config.providers.googleEu.translationRequestsMinute | quote }}
  GOOGLE_TRANSLATION_CHARACTERS_MINUTE: {{ .Values.config.providers.googleEu.translationCharactersMinute | quote }}
  GOOGLE_TTS_SESSIONS: {{ .Values.config.providers.googleEu.ttsSessions | quote }}
  GOOGLE_TTS_STARTS_MINUTE: {{ .Values.config.providers.googleEu.ttsStartsMinute | quote }}
  {{- else if eq .Values.config.providerProfile "google-speech-eu" }}
  GOOGLE_APPLICATION_CREDENTIALS: "/run/secrets/google-adc.json"
  GOOGLE_CLOUD_PROJECT: {{ .Values.config.providers.googleSpeechEu.cloudProject | quote }}
  GOOGLE_QUOTA_PROJECT: {{ .Values.config.providers.googleSpeechEu.quotaProject | quote }}
  GOOGLE_SPEECH_LOCATION: {{ .Values.config.providers.googleSpeechEu.speechLocation | quote }}
  GOOGLE_SPEECH_MODEL: {{ .Values.config.providers.googleSpeechEu.speechModel | quote }}
  GOOGLE_TRANSLATION_LOCATION: {{ .Values.config.providers.googleSpeechEu.translationLocation | quote }}
  GOOGLE_TRANSLATION_MODEL: {{ .Values.config.providers.googleSpeechEu.translationModel | quote }}
  GOOGLE_TTS_LOCATION: {{ .Values.config.providers.googleSpeechEu.ttsLocation | quote }}
  GOOGLE_TTS_VOICE: {{ .Values.config.providers.googleSpeechEu.ttsVoice | quote }}
  GOOGLE_TTS_VOICE_LOCALE: {{ .Values.config.providers.googleSpeechEu.ttsVoiceLocale | quote }}
  {{- else if eq .Values.config.providerProfile "deepgram-deepl-eu" }}
  DEEPGRAM_API_KEY_FILE: "/run/secrets/deepgram-api-key"
  DEEPL_API_KEY_FILE: "/run/secrets/deepl-api-key"
  DEEPGRAM_LISTEN_ENDPOINT: {{ .Values.config.providers.deepgramDeeplEu.deepgramListenEndpoint | quote }}
  DEEPGRAM_SPEAK_ENDPOINT: {{ .Values.config.providers.deepgramDeeplEu.deepgramSpeakEndpoint | quote }}
  DEEPGRAM_STT_MODEL: {{ .Values.config.providers.deepgramDeeplEu.deepgramSttModel | quote }}
  DEEPGRAM_TTS_MODEL: {{ .Values.config.providers.deepgramDeeplEu.deepgramTtsModel | quote }}
  DEEPGRAM_VOICE: {{ .Values.config.providers.deepgramDeeplEu.deepgramVoice | quote }}
  DEEPGRAM_APPROVED_VOICES: {{ join "," .Values.config.providers.deepgramDeeplEu.deepgramApprovedVoices | quote }}
  DEEPL_ENDPOINT: {{ .Values.config.providers.deepgramDeeplEu.deeplEndpoint | quote }}
  DEEPL_MODEL_TYPE: {{ .Values.config.providers.deepgramDeeplEu.deeplModelType | quote }}
  DEEPGRAM_STREAMS: {{ .Values.config.providers.deepgramDeeplEu.deepgramStreams | quote }}
  DEEPGRAM_AUDIO_SECONDS_MINUTE: {{ .Values.config.providers.deepgramDeeplEu.deepgramAudioSecondsMinute | quote }}
  DEEPL_REQUESTS_MINUTE: {{ .Values.config.providers.deepgramDeeplEu.deeplRequestsMinute | quote }}
  DEEPL_CHARACTERS_MINUTE: {{ .Values.config.providers.deepgramDeeplEu.deeplCharactersMinute | quote }}
  {{- end }}
  DATABASE_URL_FILE: "/run/secrets/database-url"
  REDIS_URL_FILE: "/run/secrets/redis-url"
  LIVEKIT_INTERNAL_URL: {{ .Values.config.livekitUrl | quote }}
  LIVEKIT_URL: {{ .Values.config.livekitUrl | quote }}
  LIVEKIT_CREDENTIALS_FILE: "/run/secrets/livekit-credentials"
  S3_ENDPOINT: {{ .Values.config.s3Endpoint | quote }}
  S3_PUBLIC_ENDPOINT: {{ required "config.s3PublicEndpoint must be a public HTTPS endpoint" .Values.config.s3PublicEndpoint | quote }}
  S3_REGION: {{ .Values.config.s3Region | quote }}
  S3_BUCKET: {{ .Values.config.s3Bucket | quote }}
  S3_CREDENTIALS_FILE: "/run/secrets/s3-credentials"
  S3_KMS_KEY_ID: {{ .Values.config.s3KmsKeyId | quote }}
  ARCHIVE_REQUIRE_KMS: {{ .Values.config.archiveRequireKms | quote }}
  SMTP_URL_FILE: "/run/secrets/smtp-url"
  PUBLIC_BASE_URL: {{ .Values.config.publicUrl | quote }}
  PUBLIC_LIVEKIT_URL: {{ .Values.config.publicLivekitUrl | quote }}
  {{- if .Values.config.trustedClientIpHeader }}
  TRUSTED_CLIENT_IP_HEADER: {{ .Values.config.trustedClientIpHeader | quote }}
  {{- end }}
  INTERNAL_JWT_ISSUER: {{ .Values.config.internalIssuer | quote }}
  INTERNAL_JWT_AUDIENCE: {{ .Values.config.internalAudience | quote }}
  SPOOL_KEYRING_FILE: "/run/secrets/spool-keyring"
  MAGIC_LINK_SEAL_KEYS_FILE: {{ required "magicLinkSealKeys.mountPath must identify the mounted keyring file" .Values.magicLinkSealKeys.mountPath | quote }}
  CONTROL_INTERNAL_URL: {{ printf "http://%s-web:%v" (include "transhooter.fullname" .) .Values.service.port | quote }}
