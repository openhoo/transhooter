nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

images:
  web:
    repository: ghcr.io/transhooter/web
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  controlWorker:
    repository: ghcr.io/transhooter/control-worker
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  translationWorker:
    repository: ghcr.io/transhooter/translation-worker
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  egress:
    repository: livekit/egress
    tag: "v1.12.0"
    pullPolicy: IfNotPresent

telemetry:
  enabled: false
  endpoint: ""
  traceSampleRatio: 0.01
  metricExportIntervalMillis: 60000
  collector:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.130.1"
      pullPolicy: IfNotPresent
    replicas: 1
    ports:
      otlpGrpc: 4317
      otlpHttp: 4318
      prometheus: 8889
      health: 13133
    resources:
      requests: {cpu: 100m, memory: 128Mi}
      limits: {cpu: 500m, memory: 512Mi}

replicas:
  web: 2
  controlWorker: 2
  translationWorker: 1
  spoolDrainer: 1

existingSecret: transhooter-runtime
magicLinkSealKeys:
  existingSecret: transhooter-runtime
  # Project this key into the web pod. Rotate the JSON keyring in-place while
  # retaining decrypt-only keys, then bump rollout.runtimeSecretRevision.
  secretKey: magic-link-seal-keys
  mountPath: /run/secrets/magic-link-seal-keys
providerSecretName: transhooter-provider
providerSecretKeys: [google-adc.json]
egressConfigSecret: transhooter-egress-config
rollout:
  runtimeSecretRevision: "1"
  providerSecretRevision: "1"
  egressConfigSecretRevision: "1"
spool:
  existingClaim: transhooter-spool

config:
  appEnv: production
  providerProfile: google-eu
  livekitUrl: wss://livekit.example.invalid
  s3Endpoint: https://s3.example.invalid
  s3PublicEndpoint: https://s3.example.invalid
  s3Region: eu-central-1
  s3Bucket: transhooter
  s3KmsKeyId: example-kms-key-id
  archiveRequireKms: true
  publicUrl: https://transhooter.example.invalid
  publicLivekitUrl: wss://livekit.example.invalid
  # The ingress/LB must overwrite this single-IP header and strip any client value.
  trustedClientIpHeader: x-transhooter-client-ip
  internalIssuer: https://kubernetes.default.svc
  internalAudience: transhooter-internal
  kubernetesApiAudience: https://kubernetes.default.svc
  bootstrapAdminName: Administrator
  providers:
    googleEu:
      cloudProject: example-project
      quotaProject: example-project
      speechEndpoint: eu-speech.googleapis.com
      speechRecognizer: projects/example-project/locations/eu/recognizers/_
      speechModel: long
      translationEndpoint: translate-eu.googleapis.com
      translationParent: projects/example-project/locations/eu
      translationModel: projects/example-project/locations/eu/models/general/nmt
      ttsEndpoint: eu-texttospeech.googleapis.com
      ttsModel: chirp-3-hd
      ttsVoice: en-US-Chirp3-HD-Achernar
      sttStreams: 2
      sttMessagesMinute: 500
      translationRequestsMinute: 100
      translationCharactersMinute: 100000
      ttsSessions: 2
      ttsStartsMinute: 40
    deepgramDeeplEu:
      deepgramListenEndpoint: wss://api.eu.deepgram.com/v1/listen
      deepgramSpeakEndpoint: wss://api.eu.deepgram.com/v1/speak
      deepgramSttModel: nova-3
      deepgramTtsModel: aura-2
      deepgramVoice: aura-2-viktoria-de
      deepgramApprovedVoices:
        - aura-2-thalia-en
        - aura-2-viktoria-de
      deeplEndpoint: https://api.deepl.com
      deeplModelType: latency_optimized
      deepgramStreams: 1
      deepgramAudioSecondsMinute: 60
      deeplRequestsMinute: 1
      deeplCharactersMinute: 1
service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

egress:
  enabled: true
  replicas: 1
  seccomp:
    type: RuntimeDefault
    localhostProfile: ""
  resources:
    requests: {cpu: "4", memory: 4Gi}
    limits: {cpu: "8", memory: 8Gi}
  nodeSelector: {}
  tolerations: []
  affinity: {}

resources:
  web:
    requests: {cpu: 250m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}
  controlWorker:
    requests: {cpu: 250m, memory: 256Mi}
    limits: {cpu: "2", memory: 2Gi}
  translationWorker:
    requests: {cpu: "1", memory: 1Gi}
    limits: {cpu: "4", memory: 4Gi}

podAnnotations: {}
