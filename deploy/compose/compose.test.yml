x-web-runtime-volumes: []

x-provider-disabled-env: &provider-disabled-env
  GOOGLE_APPLICATION_CREDENTIALS: ""
  GOOGLE_CLOUD_PROJECT: ""
  GOOGLE_QUOTA_PROJECT: ""
  GOOGLE_TTS_VOICE: ""
  DEEPGRAM_API_KEY_FILE: ""
  DEEPGRAM_STREAMS: ""
  DEEPGRAM_AUDIO_SECONDS_MINUTE: ""
  DEEPL_API_KEY_FILE: ""
  DEEPL_REQUESTS_MINUTE: ""
  DEEPL_CHARACTERS_MINUTE: ""

x-fixture-runtime-env: &fixture-runtime-env
  APP_ENV: test
  PROVIDER_PROFILE: fixture
  PROVIDER_NETWORK_DISABLED: "true"
  OTEL_SDK_DISABLED: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_METRIC_EXPORT_INTERVAL: "5000"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "1"
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=transhooter,deployment.environment.name=test
  ARCHIVE_REQUIRE_KMS: "false"


services:
  secrets-init:
    volumes: !override
      - test-secrets:/secrets
      - ../scripts/init-secrets.sh:/usr/local/bin/init-secrets:ro
      - test-migrator-secrets:/exports/migrator
      - test-integration-migrator-secrets:/exports/integration-migrator
      - test-web-secrets:/exports/web
      - test-control-secrets:/exports/control
      - test-translation-worker-secrets:/exports/translation-worker
      - test-spool-drainer-secrets:/exports/spool-drainer
      - test-provider-diagnostics-secrets:/exports/provider-diagnostics
      - test-capability-secrets:/exports/capability

  postgres:
    volumes: !override
      - postgres-data:/var/lib/postgresql/data
      - test-secrets:/run/secrets:ro

  postgres-role-bootstrap:
    environment:
      POSTGRES_INTEGRATION_DATABASE: transhooter_integration
    volumes: !override
      - test-secrets:/run/secrets:ro
      - ../scripts/postgres_bootstrap.sh:/usr/local/bin/postgres-bootstrap:ro

  postgres-capability-bootstrap:
    volumes: !override
      - test-secrets:/run/secrets:ro
      - ../scripts/postgres_bootstrap.sh:/usr/local/bin/postgres-bootstrap:ro

  redis:
    volumes: !override
      - redis-data:/data
      - test-secrets:/run/secrets:ro

  minio-bootstrap:
    volumes: !override
      - test-secrets:/run/secrets:ro

  minio-identity-bootstrap:
    volumes: !override
      - test-secrets:/run/secrets:ro
      - ../scripts/minio_identities.sh:/usr/local/bin/minio-identities:ro

  egress-ready:
    volumes: !override
      - test-secrets:/run/secrets:ro

  minio:
    ports: !override []
    volumes: !override
      - minio-data:/data
      - test-secrets:/run/secrets:ro

  mailpit:
    image: axllent/mailpit:v1.27.8
    restart: unless-stopped
    networks: [backend]
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    healthcheck:
      test: [CMD, /mailpit, readyz]
      interval: 5s
      timeout: 5s
      retries: 20

  livekit:
    networks:
      backend:
        ipv4_address: ${RTC_NODE_IP:-10.254.232.250}
      edge: {}
    ports: !override []
    environment:
      RTC_ADVERTISED_IP: ${RTC_NODE_IP:-10.254.232.250}
    volumes: !override
      - test-secrets:/secrets:ro
      - runtime-config:/runtime
      - ./livekit.yaml:/templates/livekit.yaml:ro
      - ./egress.yaml:/templates/egress.yaml:ro
      - ../scripts/render-config.sh:/usr/local/bin/render-config:ro

  egress:
    environment:
      RTC_ADVERTISED_IP: ${RTC_NODE_IP:-10.254.232.250}
    security_opt: !override
      - no-new-privileges:true
      - seccomp=unconfined
    volumes: !override
      - test-secrets:/secrets:ro
      - ./livekit.yaml:/templates/livekit.yaml:ro
      - ./egress.yaml:/templates/egress.yaml:ro
      - ../scripts/render-config.sh:/usr/local/bin/render-config:ro

  profile-preflight:
    environment:
      <<: *provider-disabled-env
      APP_ENV: test
      SPOOL_KEYRING_FILE: ""
      PROVIDER_PROFILE: fixture
    command: [transhooter-provider, preflight, --profile, fixture]
    volumes: !override []

  capability-publisher:
    depends_on:
      otel-collector: {condition: service_healthy}
    environment:
      <<: *fixture-runtime-env
      DATABASE_URL_FILE: /run/capability-secrets/database-capability-url
      SMTP_URL: smtp://mailpit:1025
    volumes: !override
      - test-web-secrets:/run/secrets:ro
      - test-capability-secrets:/run/capability-secrets:ro

  language-refresh:
    environment:
      <<: *provider-disabled-env
      APP_ENV: test
      PROVIDER_PROFILE: fixture
      DATABASE_URL_FILE: /run/secrets/database-capability-url
      INTERNAL_TOKEN_FILE: /run/secrets/internal-translation-token
    command: [transhooter-provider, sync, --profile, fixture]
    volumes: !override
      - test-capability-secrets:/run/secrets:ro

  translation-worker:
    depends_on:
      otel-collector: {condition: service_healthy}
    environment:
      <<: [*provider-disabled-env, *fixture-runtime-env]
      FIXTURE_SCENARIO_FILE: /shared/worker-scenarios.json
      DATABASE_URL_FILE: /run/secrets/database-translation-url
      INTERNAL_TOKEN_FILE: /run/secrets/internal-translation-token
    volumes: !override
      - spool-data:/var/lib/transhooter/spool
      - test-translation-worker-secrets:/run/secrets:ro
      - fault-control:/shared:ro

  spool-drainer:
    depends_on:
      otel-collector: {condition: service_healthy}
      web: {condition: service_healthy}
    environment:
      APP_ENV: test
      OTEL_SDK_DISABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_METRIC_EXPORT_INTERVAL: "5000"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1"
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=transhooter,deployment.environment.name=test
      ARCHIVE_REQUIRE_KMS: "false"
      SPOOL_DRAINER_SCENARIO_FILE: /shared/spool-drainer-scenarios.json
      INTERNAL_TOKEN_FILE: /run/secrets/internal-spool-drainer-token
    volumes: !override
      - spool-data:/var/lib/transhooter/spool
      - test-spool-drainer-secrets:/run/secrets:ro
      - fault-control:/shared

  migrate:
    environment:
      APP_ENV: test
      DATABASE_URL_FILE: /run/secrets/database-migrator-url
    volumes: !override
      - test-migrator-secrets:/run/secrets:ro

  bootstrap-admin:
    depends_on:
      migrate: {condition: service_completed_successfully}
      language-refresh: {condition: service_completed_successfully}
    environment:
      APP_ENV: test
      DATABASE_URL_FILE: /run/secrets/database-web-url
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?set BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Test Administrator}
    command: [bun, run, admin:create-staff, --email, "${BOOTSTRAP_ADMIN_EMAIL}", --name, "${BOOTSTRAP_ADMIN_NAME:-Test Administrator}", --role, admin]
    volumes: !override
      - test-web-secrets:/run/secrets:ro

  fault-control-init:
    image: alpine:3.22.5
    user: "0:0"
    restart: "no"
    networks: [backend]
    volumes: [fault-control:/shared]
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /shared/releases /shared/failure-smoke-owners
        chmod 0777 /shared
        chmod 0777 /shared/releases /shared/failure-smoke-owners
        if [ ! -e /shared/faults.json ] || ! grep -q '"consultations"' /shared/faults.json; then
          printf '{"consultations":{}}\n' > /shared/faults.json.tmp
          chmod 0666 /shared/faults.json.tmp
          mv /shared/faults.json.tmp /shared/faults.json
        fi
        if [ ! -e /shared/worker-scenarios.json ] || ! grep -q '"consultations"' /shared/worker-scenarios.json || grep -q '"\*"' /shared/worker-scenarios.json; then
          printf '{"consultations":{}}\n' > /shared/worker-scenarios.json.tmp
          chmod 0666 /shared/worker-scenarios.json.tmp
          mv /shared/worker-scenarios.json.tmp /shared/worker-scenarios.json
        fi
        if [ ! -e /shared/spool-drainer-scenarios.json ] || ! grep -q '"consultations"' /shared/spool-drainer-scenarios.json || grep -q '"\*"' /shared/spool-drainer-scenarios.json; then
          printf '{"consultations":{}}\n' > /shared/spool-drainer-scenarios.json.tmp
          chmod 0666 /shared/spool-drainer-scenarios.json.tmp
          mv /shared/spool-drainer-scenarios.json.tmp /shared/spool-drainer-scenarios.json
        fi

  control-worker-1:
    depends_on:
      bootstrap-admin: {condition: service_completed_successfully}
      fault-control-init: {condition: service_completed_successfully}
      otel-collector: {condition: service_healthy}
    environment:
      <<: *fixture-runtime-env
      DATABASE_URL_FILE: /run/secrets/database-control-url
      TEST_FAULT_CONTROL_FILE: /shared/faults.json
      SMTP_URL: smtp://mailpit:1025
    volumes: !override
      - test-control-secrets:/run/secrets:ro
      - fault-control:/shared

  control-worker-2:
    depends_on:
      bootstrap-admin: {condition: service_completed_successfully}
      fault-control-init: {condition: service_completed_successfully}
      otel-collector: {condition: service_healthy}
    environment:
      <<: *fixture-runtime-env
      DATABASE_URL_FILE: /run/secrets/database-control-url
      TEST_FAULT_CONTROL_FILE: /shared/faults.json
      SMTP_URL: smtp://mailpit:1025
    volumes: !override
      - test-control-secrets:/run/secrets:ro
      - fault-control:/shared

  web:
    ports: !override []
    depends_on: !override
      bootstrap-admin: {condition: service_completed_successfully}
      mailpit: {condition: service_healthy}
      livekit: {condition: service_healthy}
      language-refresh: {condition: service_completed_successfully}
      egress-ready: {condition: service_completed_successfully}
      translation-worker: {condition: service_healthy}
      control-worker-1: {condition: service_healthy}
      control-worker-2: {condition: service_healthy}
      otel-collector: {condition: service_healthy}
    environment:
      <<: *fixture-runtime-env
      DATABASE_URL_FILE: /run/secrets/database-web-url
      PUBLIC_BASE_URL: http://app.localhost:3000
      PUBLIC_LIVEKIT_URL: ws://rtc.localhost:7880
      SMTP_URL: smtp://mailpit:1025
    volumes: !override
      - test-web-secrets:/run/secrets:ro

  test-dependencies-ready:
    image: alpine:3.22.5
    restart: "no"
    networks: [backend]
    depends_on:
      bootstrap-admin: {condition: service_completed_successfully}
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio-bootstrap: {condition: service_completed_successfully}
      livekit: {condition: service_healthy}
      mailpit: {condition: service_healthy}
      otel-collector: {condition: service_healthy}
    command: [tail, -f, /dev/null]
    healthcheck:
      test: [CMD, /bin/true]
      interval: 1s
      timeout: 1s
      retries: 3

  test:
    depends_on:
      bootstrap-admin: {condition: service_completed_successfully}
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio-bootstrap: {condition: service_completed_successfully}
      livekit: {condition: service_healthy}
      mailpit: {condition: service_healthy}
    environment:
      <<: *fixture-runtime-env
      DATABASE_URL_FILE: /run/secrets/database-web-url
      POSTGRES_CONCURRENCY_DATABASE_URL_FILE: /run/integration-secrets/database-integration-migrator-url
      REDIS_URL_FILE: /run/secrets/redis-url
      TEST_GATE_PHASE_DEADLINE_SECONDS: ${TEST_GATE_PHASE_DEADLINE_SECONDS:-600}
    volumes: !override
      - test-web-secrets:/run/secrets:ro
      - test-integration-migrator-secrets:/run/integration-secrets:ro
    tmpfs:
      - /tmp:size=536870912,mode=1777

  provider-benchmark:
    environment:
      <<: [*provider-disabled-env, *fixture-runtime-env]
    volumes: !override
      - ../../tests/fixtures:/workspace/tests/fixtures:ro
      - test-provider-diagnostics-secrets:/run/secrets:ro

  e2e:
    environment:
      <<: *fixture-runtime-env
      EXPECTED_PROFILE: fixture
      MAILPIT_URL: http://mailpit:8025

  failure-smoke:
    user: "0:0"
    cap_add: [DAC_OVERRIDE, FOWNER]
    depends_on:
      bootstrap-admin: {condition: service_completed_successfully}
      language-refresh: {condition: service_completed_successfully}
      web: {condition: service_healthy}
      spool-drainer: {condition: service_started}
    environment:
      <<: *fixture-runtime-env
      TARGET_COMPOSE_PROJECT: ${COMPOSE_PROJECT_NAME:-transhooter}
      DATABASE_URL_FILE: /run/secrets/database-web-url
      BASE_URL: http://app.localhost:3000
      LIVEKIT_URL: ws://rtc.localhost:7880
      MAILPIT_URL: http://mailpit:8025
      E2E_EMPLOYEE_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?set BOOTSTRAP_ADMIN_EMAIL}
      EXPECTED_PROFILE: fixture
      FAULT_CONTROL_FILE: /shared/faults.json
      WORKER_SCENARIO_FILE: /shared/worker-scenarios.json
      FAILURE_RELEASE_DIR: /shared/releases
    volumes: !override
      - test-web-secrets:/run/secrets:ro
      - fault-control:/shared
      - spool-data:/var/lib/transhooter/spool
      - ${CONTAINER_ENGINE_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

networks:
  backend:
    internal: true

volumes:
  test-secrets:
  test-migrator-secrets:
  test-integration-migrator-secrets:
  test-web-secrets:
  test-control-secrets:
  test-translation-worker-secrets:
  test-capability-secrets:
  test-spool-drainer-secrets:
  test-provider-diagnostics-secrets:
  fault-control:
