name: transhooter

x-app-base: &app-base
  restart: unless-stopped
  init: true
  user: "10001:10001"
  networks: [backend]
  security_opt: [no-new-privileges:true]
  cap_drop: [ALL]

x-runtime-images:
  typescript: &typescript-runtime-image "${COMPOSE_PROJECT_NAME:-transhooter}-typescript-runtime:${APP_IMAGE_TAG:-local}"
  translation: &translation-runtime-image "${COMPOSE_PROJECT_NAME:-transhooter}-translation-runtime:${APP_IMAGE_TAG:-local}"
  bootstrap: &bootstrap-runtime-image "${COMPOSE_PROJECT_NAME:-transhooter}-bootstrap-runtime:${APP_IMAGE_TAG:-local}"

x-worker-health: &worker-health
  test: [CMD, bun, -e, "fetch('http://127.0.0.1:8080/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 20s

x-otel-env: &otel-env
  OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT-http://otel-collector:4318}
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-60000}
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACE_SAMPLE_RATIO:-0.01}

x-control-worker-env: &control-worker-env
  <<: *otel-env
  LIVEKIT_INTERNAL_URL: ws://livekit:7880
  LIVEKIT_CREDENTIALS_FILE: /run/secrets/livekit-credentials
  S3_CREDENTIALS_FILE: /run/secrets/minio-credentials
  INTERNAL_TOKEN_FILE: /run/secrets/internal-control-token
  EGRESS_LAYOUT_SIGNING_KEY_FILE: /run/secrets/egress-layout-signing-key

x-web-runtime-env: &web-runtime-env
  <<: *otel-env
  HOSTNAME: 0.0.0.0
  PORT: 3000
  LIVEKIT_INTERNAL_URL: ws://livekit:7880
  LIVEKIT_CREDENTIALS_FILE: /run/secrets/livekit-credentials
  S3_CREDENTIALS_FILE: /run/secrets/minio-credentials
  SESSION_SECRET_FILE: /run/secrets/session-secret
  CSRF_SECRET_FILE: /run/secrets/csrf-secret
  INTERNAL_CONTROL_TOKEN_FILE: /run/secrets/internal-control-token
  INTERNAL_TRANSLATION_TOKEN_FILE: /run/secrets/internal-translation-token
  INTERNAL_SPOOL_DRAINER_TOKEN_FILE: /run/secrets/internal-spool-drainer-token
  EGRESS_LAYOUT_SIGNING_KEY_FILE: /run/secrets/egress-layout-signing-key
  MAGIC_LINK_SEAL_KEYS_FILE: /run/secrets/magic-link-seal-keys
  NEXT_TELEMETRY_DISABLED: "1"

x-web-runtime-volumes: &web-runtime-volumes
  - ../../.secrets/database-url:/run/secrets/database-url:ro
  - ../../.secrets/redis-url:/run/secrets/redis-url:ro
  - ../../.secrets/livekit-credentials:/run/secrets/livekit-credentials:ro
  - ../../.secrets/minio-credentials:/run/secrets/minio-credentials:ro
  - ../../.secrets/session-secret:/run/secrets/session-secret:ro
  - ../../.secrets/csrf-secret:/run/secrets/csrf-secret:ro
  - ../../.secrets/internal-control-token:/run/secrets/internal-control-token:ro
  - ../../.secrets/internal-translation-token:/run/secrets/internal-translation-token:ro
  - ../../.secrets/internal-spool-drainer-token:/run/secrets/internal-spool-drainer-token:ro
  - ../../.secrets/egress-layout-signing-key:/run/secrets/egress-layout-signing-key:ro
  - ../../.secrets/magic-link-seal-keys:/run/secrets/magic-link-seal-keys:ro

services:
  secrets-init:
    image: alpine:3.22.1
    user: "0:0"
    restart: "no"
    networks: [backend]
    volumes:
      - ../../.secrets:/secrets
      - ../scripts/init-secrets.sh:/usr/local/bin/init-secrets:ro
    command: [/bin/sh, /usr/local/bin/init-secrets]
    environment:
      RUNTIME_GID: "10001"

  spool-init:
    image: alpine:3.22.1
    user: "0:0"
    restart: "no"
    networks: [backend]
    volumes:
      - spool-data:/var/lib/transhooter/spool
    command: [/bin/sh, -ec, "mkdir -p /var/lib/transhooter/spool && chown 10001:10001 /var/lib/transhooter/spool && chmod 0700 /var/lib/transhooter/spool"]


  postgres:
    image: postgres:17.5-bookworm
    restart: unless-stopped
    networks: [backend]
    environment:
      POSTGRES_DB: transhooter
      POSTGRES_USER: transhooter
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../.secrets/postgres-password:/run/secrets/postgres-password:ro
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U transhooter -d transhooter"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.0.2-bookworm
    restart: unless-stopped
    networks: [backend]
    volumes:
      - redis-data:/data
      - ../../.secrets/redis-password:/run/secrets/redis-password:ro
    command: [/bin/sh, -ec, "exec redis-server --appendonly yes --requirepass \"$$(cat /run/secrets/redis-password)\""]
    healthcheck:
      test: [CMD-SHELL, "REDISCLI_AUTH=$$(cat /run/secrets/redis-password) redis-cli ping | grep -qx PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    networks: [backend, edge]
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio-access-key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio-secret-key
      MINIO_API_STALE_UPLOADS_EXPIRY: 168h
      MINIO_API_STALE_UPLOADS_CLEANUP_INTERVAL: 1h
    volumes:
      - minio-data:/data
      - ../../.secrets/minio-access-key:/run/secrets/minio-access-key:ro
      - ../../.secrets/minio-secret-key:/run/secrets/minio-secret-key:ro
    command: [server, /data, --console-address, ":9001"]
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:9000/minio/health/ready]
      interval: 5s
      timeout: 5s
      retries: 30


  minio-bootstrap:
    image: *bootstrap-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/bootstrap.Dockerfile
    restart: "no"
    networks: [backend]
    depends_on:
      minio: {condition: service_healthy}
      secrets-init: {condition: service_completed_successfully}
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_REGION: eu-central-1
      S3_BUCKET: transhooter
      S3_ACCESS_KEY_FILE: /run/secrets/minio-access-key
      S3_SECRET_KEY_FILE: /run/secrets/minio-secret-key
      ARCHIVE_REQUIRE_KMS: "false"
      MINIO_STALE_UPLOADS_EXPIRY: 168h
    volumes:
      - ../../.secrets/minio-access-key:/run/secrets/minio-access-key:ro
      - ../../.secrets/minio-secret-key:/run/secrets/minio-secret-key:ro
    command: [python, /opt/transhooter/minio_bootstrap.py]

  livekit:
    image: livekit/livekit-server:v1.9.2
    restart: unless-stopped
    user: "0:10001"
    networks:
      backend:
        ipv4_address: ${RTC_BRIDGE_IP:-10.254.231.10}
      edge: {}
    depends_on:
      secrets-init: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    environment:
      RTC_ADVERTISED_IP: ${RTC_ADVERTISED_IP:-}
      RTC_UDP_PORT_START: ${RTC_UDP_PORT_START:-50000}
      RTC_UDP_PORT_END: ${RTC_UDP_PORT_END:-60000}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "${RTC_UDP_PORT_START:-50000}-${RTC_UDP_PORT_END:-60000}:${RTC_UDP_PORT_START:-50000}-${RTC_UDP_PORT_END:-60000}/udp"
    volumes:
      - ../../.secrets/livekit-api-key:/secrets/livekit-api-key:ro
      - ../../.secrets/livekit-api-secret:/secrets/livekit-api-secret:ro
      - ../../.secrets/redis-password:/secrets/redis-password:ro
      - runtime-config:/runtime
      - ./livekit.yaml:/templates/livekit.yaml:ro
      - ./egress.yaml:/templates/egress.yaml:ro
      - ../scripts/render-config.sh:/usr/local/bin/render-config:ro
    entrypoint: [/bin/sh, -ec]
    command:
      - |
        : "$${RTC_ADVERTISED_IP:?set RTC_ADVERTISED_IP to the externally reachable LiveKit RTC address}"
        printf '%s\n' "$$RTC_ADVERTISED_IP" > /runtime/rtc-host.tmp
        chmod 0444 /runtime/rtc-host.tmp
        mv -f /runtime/rtc-host.tmp /runtime/rtc-host
        /usr/local/bin/render-config
        exec /livekit-server --config /runtime/livekit.yaml
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:7880/]
      interval: 5s
      timeout: 5s
      retries: 30

  egress:
    image: livekit/egress:v1.12.0
    restart: unless-stopped
    init: true
    networks: [backend]
    depends_on:
      livekit: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio-bootstrap: {condition: service_completed_successfully}
    environment:
      EGRESS_CONFIG_FILE: /runtime/egress.yaml
      RTC_ADVERTISED_IP: ${RTC_ADVERTISED_IP:-}
      RTC_UDP_PORT_START: ${RTC_UDP_PORT_START:-50000}
      RTC_UDP_PORT_END: ${RTC_UDP_PORT_END:-60000}
    group_add: ["10001"]
    volumes:
      - ../../.secrets/livekit-api-key:/secrets/livekit-api-key:ro
      - ../../.secrets/livekit-api-secret:/secrets/livekit-api-secret:ro
      - ../../.secrets/redis-password:/secrets/redis-password:ro
      - ./livekit.yaml:/templates/livekit.yaml:ro
      - ./egress.yaml:/templates/egress.yaml:ro
      - ../scripts/render-config.sh:/usr/local/bin/render-config:ro
    tmpfs:
      - /runtime:size=1048576,mode=0770,uid=0,gid=0
    entrypoint: [/bin/bash, -ec]
    command:
      - |
        : "$${RTC_ADVERTISED_IP:?set RTC_ADVERTISED_IP to the externally reachable LiveKit RTC address}"
        printf '%s\n' "$$RTC_ADVERTISED_IP" > /runtime/rtc-host.tmp
        chmod 0444 /runtime/rtc-host.tmp
        mv -f /runtime/rtc-host.tmp /runtime/rtc-host
        /usr/local/bin/render-config
        exec /entrypoint.sh
    shm_size: 1gb
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - seccomp=./chrome-sandboxing-seccomp-profile.json
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8080/]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.1
    restart: unless-stopped
    init: true
    user: "10001:10001"
    networks: [backend]
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    expose: ["4317", "4318", "8889", "13133"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: [--config=/etc/otelcol-contrib/config.yaml]
    healthcheck:
      test: [CMD, /otelcol-contrib, validate, --config=http://127.0.0.1:13133/]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        reservations:
          cpus: "0.10"
          memory: 128M
        limits:
          cpus: "0.50"
          memory: 512M
          pids: 128


  egress-ready:
    image: *bootstrap-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/bootstrap.Dockerfile
    restart: "no"
    networks: [backend]
    depends_on:
      egress: {condition: service_healthy}
      minio-bootstrap: {condition: service_completed_successfully}
      livekit: {condition: service_healthy}
    environment:
      LIVEKIT_HTTP_URL: http://livekit:7880
      S3_ENDPOINT: http://minio:9000
      S3_REGION: eu-central-1
      S3_BUCKET: transhooter
      S3_ACCESS_KEY_FILE: /run/secrets/minio-access-key
      S3_SECRET_KEY_FILE: /run/secrets/minio-secret-key
      LIVEKIT_API_KEY_FILE: /run/secrets/livekit-api-key
      LIVEKIT_API_SECRET_FILE: /run/secrets/livekit-api-secret
    volumes:
      - ../../.secrets/minio-access-key:/run/secrets/minio-access-key:ro
      - ../../.secrets/minio-secret-key:/run/secrets/minio-secret-key:ro
      - ../../.secrets/livekit-api-key:/run/secrets/livekit-api-key:ro
      - ../../.secrets/livekit-api-secret:/run/secrets/livekit-api-secret:ro
    command: [python, /opt/transhooter/egress_readiness.py]

  migrate:
    <<: *app-base
    image: *typescript-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/typescript.Dockerfile
      target: runtime
    restart: "no"
    depends_on:
      postgres: {condition: service_healthy}
      secrets-init: {condition: service_completed_successfully}
    environment: &server-env
      APP_ENV: ${APP_ENV:-development}
      PROVIDER_PROFILE: ${PROVIDER_PROFILE:?set PROVIDER_PROFILE}
      DATABASE_URL_FILE: /run/secrets/database-url
      REDIS_URL_FILE: /run/secrets/redis-url
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: eu-central-1
      S3_BUCKET: transhooter
    volumes:
      - ../../.secrets/database-url:/run/secrets/database-url:ro
    command: [bun, deploy/scripts/migrate.mjs]

  bootstrap-admin:
    <<: *app-base
    image: *typescript-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/typescript.Dockerfile
      target: runtime
    restart: "no"
    depends_on:
      migrate: {condition: service_completed_successfully}
    environment:
      <<: *server-env
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?set BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Local Administrator}
    volumes: ["../../.secrets/database-url:/run/secrets/database-url:ro"]
    command: [bun, run, admin:create-staff, --email, "${BOOTSTRAP_ADMIN_EMAIL}", --name, "${BOOTSTRAP_ADMIN_NAME:-Local Administrator}", --role, admin]

  profile-preflight:
    <<: *app-base
    image: *translation-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/translation-worker.Dockerfile
    restart: "no"
    environment:
      APP_ENV: ${APP_ENV:-development}
      PROVIDER_PROFILE: ${PROVIDER_PROFILE:?set PROVIDER_PROFILE}
      SPOOL_KEYRING_FILE: /run/secrets/spool-keyring
    volumes:
      - ../../.secrets/spool-keyring:/run/secrets/spool-keyring:ro
    command: [python, -m, transhooter_worker.providers, preflight]

  capability-publisher:
    <<: *app-base
    image: *typescript-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/typescript.Dockerfile
      target: runtime
    depends_on:
      migrate: {condition: service_completed_successfully}
    environment:
      <<: [*server-env, *web-runtime-env]
      OTEL_SERVICE_NAME: transhooter-capability-publisher
      PUBLIC_BASE_URL: http://capability-publisher:3000
      PUBLIC_LIVEKIT_URL: ws://livekit:7880
    volumes: *web-runtime-volumes
    command: [bun, apps/web/.next/standalone/apps/web/server.js]
    healthcheck:
      test: [CMD, bun, -e, "fetch('http://127.0.0.1:3000/api/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  language-refresh:
    <<: *app-base
    image: *translation-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/translation-worker.Dockerfile
    restart: "no"
    depends_on:
      migrate: {condition: service_completed_successfully}
      profile-preflight: {condition: service_completed_successfully}
      capability-publisher: {condition: service_healthy}
    environment:
      APP_ENV: ${APP_ENV:-development}
      PROVIDER_PROFILE: ${PROVIDER_PROFILE:?set PROVIDER_PROFILE}
      DATABASE_URL_FILE: /run/secrets/database-url
      SPOOL_KEYRING_FILE: /run/secrets/spool-keyring
      CAPABILITY_PUBLISH_URL: http://capability-publisher:3000/api/internal/capabilities
      INTERNAL_TOKEN_FILE: /run/secrets/internal-token
    volumes:
      - ../../.secrets/database-url:/run/secrets/database-url:ro
      - ../../.secrets/spool-keyring:/run/secrets/spool-keyring:ro
      - ../../.secrets/internal-translation-token:/run/secrets/internal-token:ro
    command: [python, -m, transhooter_worker.providers, sync]

  translation-worker:
    <<: *app-base
    image: *translation-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/translation-worker.Dockerfile
    depends_on:
      migrate: {condition: service_completed_successfully}
      language-refresh: {condition: service_completed_successfully}
      spool-init: {condition: service_completed_successfully}
      livekit: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio-bootstrap: {condition: service_completed_successfully}
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: transhooter-translation-worker
      APP_ENV: ${APP_ENV:-development}
      PROVIDER_PROFILE: ${PROVIDER_PROFILE:?set PROVIDER_PROFILE}
      DATABASE_URL_FILE: /run/secrets/database-url
      REDIS_URL_FILE: /run/secrets/redis-url
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_CREDENTIALS_FILE: /run/secrets/livekit-credentials
      S3_ENDPOINT: http://minio:9000
      S3_REGION: eu-central-1
      S3_BUCKET: transhooter
      S3_CREDENTIALS_FILE: /run/secrets/minio-credentials
      ARCHIVE_REQUIRE_KMS: "false"
      SPOOL_KEYRING_FILE: /run/secrets/spool-keyring
      INTERNAL_TOKEN_FILE: /run/secrets/internal-token
      CONTROL_INTERNAL_URL: http://web:3000
      WORKER_INTERNAL_BEARER_FILE: /run/secrets/internal-token
      SPOOL_WORKER_HEALTH_RATIO: ${SPOOL_WORKER_HEALTH_RATIO:-0.7}
      SPOOL_DRAINER_HEALTH_RATIO: ${SPOOL_DRAINER_HEALTH_RATIO:-0.8}
      SPOOL_PATH: /var/lib/transhooter/spool
    volumes:
      - spool-data:/var/lib/transhooter/spool
      - ../../.secrets/database-url:/run/secrets/database-url:ro
      - ../../.secrets/redis-url:/run/secrets/redis-url:ro
      - ../../.secrets/livekit-credentials:/run/secrets/livekit-credentials:ro
      - ../../.secrets/minio-credentials:/run/secrets/minio-credentials:ro
      - ../../.secrets/spool-keyring:/run/secrets/spool-keyring:ro
      - ../../.secrets/internal-translation-token:/run/secrets/internal-token:ro
    command: [python, -m, transhooter_worker, start]
    healthcheck:
      test: [CMD, python, -m, transhooter_worker.runtime.healthcheck]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  spool-drainer:
    extends: translation-worker
    environment:
      OTEL_SERVICE_NAME: transhooter-spool-drainer
      INTERNAL_TOKEN_FILE: /run/secrets/internal-token
    volumes:
      - ../../.secrets/internal-spool-drainer-token:/run/secrets/internal-token:ro
    command: [python, -m, transhooter_worker.runtime.spool_drainer]
    healthcheck:
      test: [CMD, python, -m, transhooter_worker.runtime.healthcheck, --drainer]
      interval: 10s
      timeout: 5s
      retries: 20

  control-worker-1: &control-worker
    <<: *app-base
    image: *typescript-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/typescript.Dockerfile
      target: runtime
    depends_on:
      migrate: {condition: service_completed_successfully}
      language-refresh: {condition: service_completed_successfully}
      egress-ready: {condition: service_completed_successfully}
      translation-worker: {condition: service_healthy}
    environment:
      <<: [*server-env, *control-worker-env]
      OTEL_SERVICE_NAME: transhooter-control-worker
      INSTANCE_ID: 11111111-1111-4111-8111-111111111111
    volumes:
      - ../../.secrets/database-url:/run/secrets/database-url:ro
      - ../../.secrets/redis-url:/run/secrets/redis-url:ro
      - ../../.secrets/livekit-credentials:/run/secrets/livekit-credentials:ro
      - ../../.secrets/minio-credentials:/run/secrets/minio-credentials:ro
      - ../../.secrets/internal-control-token:/run/secrets/internal-control-token:ro
      - ../../.secrets/egress-layout-signing-key:/run/secrets/egress-layout-signing-key:ro
    command: [bun, run, --filter, "@transhooter/control-worker", start]
    healthcheck: *worker-health

  control-worker-2:
    <<: *control-worker
    environment:
      <<: [*server-env, *control-worker-env]
      INSTANCE_ID: 22222222-2222-4222-8222-222222222222

  web:
    <<: *app-base
    image: *typescript-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/typescript.Dockerfile
      target: runtime
    ports: ["${WEB_PORT:-3000}:3000"]
    networks: [backend, edge]
    depends_on:
      bootstrap-admin: {condition: service_completed_successfully}
      migrate: {condition: service_completed_successfully}
      livekit: {condition: service_healthy}
      language-refresh: {condition: service_completed_successfully}
      egress-ready: {condition: service_completed_successfully}
      translation-worker: {condition: service_healthy}
      spool-drainer: {condition: service_started}
      control-worker-1: {condition: service_healthy}
      control-worker-2: {condition: service_healthy}
    environment:
      <<: [*server-env, *web-runtime-env]
      OTEL_SERVICE_NAME: transhooter-web
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      PUBLIC_LIVEKIT_URL: ${PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
      LIVEKIT_BROWSER_URL: ${PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
    volumes: *web-runtime-volumes
    command: [bun, apps/web/.next/standalone/apps/web/server.js]
    healthcheck:
      test: [CMD, bun, -e, "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  provider-benchmark:
    profiles: [benchmark]
    <<: *app-base
    image: *translation-runtime-image
    build:
      context: ../..
      dockerfile: deploy/docker/translation-worker.Dockerfile
    restart: "no"
    environment:
      APP_ENV: benchmark
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: transhooter
      S3_REGION: eu-central-1
      S3_CREDENTIALS_FILE: /run/secrets/minio-credentials
      SPOOL_KEYRING_FILE: /run/secrets/spool-keyring
    volumes:
      - ../../tests/fixtures:/workspace/tests/fixtures:ro
      - ../../.secrets/minio-credentials:/run/secrets/minio-credentials:ro
      - ../../.secrets/spool-keyring:/run/secrets/spool-keyring:ro
    command: [python, -m, transhooter_worker.providers, benchmark]

  e2e:
    profiles: [e2e]
    <<: *app-base
    build:
      context: ../..
      dockerfile: deploy/docker/e2e.Dockerfile
    restart: "no"
    depends_on:
      web: {condition: service_healthy}
    environment:
      BASE_URL: http://app.localhost:3000
      LIVEKIT_URL: ws://livekit:7880
      E2E_EMPLOYEE_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?set BOOTSTRAP_ADMIN_EMAIL}
      EXPECTED_PROFILE: ${PROVIDER_PROFILE:?set PROVIDER_PROFILE}
      EMIT_PROOF_JSON: "true"
    command: [bun, run, smoke:consultation]

  failure-smoke:
    profiles: [failure]
    <<: *app-base
    build:
      context: ../..
      dockerfile: deploy/docker/failure-smoke.Dockerfile
    restart: "no"
    depends_on:
      web: {condition: service_healthy}
    environment:
      APP_ENV: test
      BASE_URL: http://web:3000
    command: [bun, ../failure-smoke/failure-smoke.mjs]

  test:
    profiles: [test]
    <<: *app-base
    build:
      context: ../..
      dockerfile: deploy/docker/test.Dockerfile
    restart: "no"
    environment: {APP_ENV: test}
    command: [/opt/transhooter/run-tests]

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: ${RTC_SUBNET:-10.254.231.0/24}
  edge:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  spool-data:
  runtime-config:
