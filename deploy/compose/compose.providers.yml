x-production-env: &production-env
  APP_ENV: ${APP_ENV:-production}
  RTC_ADVERTISED_IP: ${RTC_ADVERTISED_IP:?set RTC_ADVERTISED_IP to the externally reachable LiveKit RTC address}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?set S3_PUBLIC_ENDPOINT to the externally reachable S3 address}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL to an explicit https:// URL}
  PUBLIC_LIVEKIT_URL: ${PUBLIC_LIVEKIT_URL:?set PUBLIC_LIVEKIT_URL to an explicit wss:// URL}
  LIVEKIT_BROWSER_URL: ${PUBLIC_LIVEKIT_URL:?set PUBLIC_LIVEKIT_URL to an explicit wss:// URL}
  ARCHIVE_REQUIRE_KMS: "false"


x-production-mail-env: &production-mail-env
  <<: *production-env
  SMTP_URL: ${SMTP_URL:?set SMTP_URL for production mail delivery}

x-provider-env: &provider-env
  <<: *production-env
  PROVIDER_PROFILE: deepgram-deepl-eu
  DEEPGRAM_API_KEY_FILE: /run/secrets/deepgram-api-key
  DEEPL_API_KEY_FILE: /run/secrets/deepl-api-key
  DEEPGRAM_VOICE: aura-2-viktoria-de
  DEEPGRAM_APPROVED_VOICES: aura-2-thalia-en,aura-2-viktoria-de
  DEEPGRAM_STREAMS: ${DEEPGRAM_STREAMS:?set DEEPGRAM_STREAMS from your account quota}
  DEEPGRAM_AUDIO_SECONDS_MINUTE: ${DEEPGRAM_AUDIO_SECONDS_MINUTE:?set DEEPGRAM_AUDIO_SECONDS_MINUTE from your account quota}
  DEEPL_REQUESTS_MINUTE: ${DEEPL_REQUESTS_MINUTE:?set DEEPL_REQUESTS_MINUTE from your account quota}
  DEEPL_CHARACTERS_MINUTE: ${DEEPL_CHARACTERS_MINUTE:?set DEEPL_CHARACTERS_MINUTE from your account quota}

x-provider-secrets: &provider-secrets
  - ../../.secrets/deepgram-api-key:/run/secrets/deepgram-api-key:ro
  - ../../.secrets/deepl-api-key:/run/secrets/deepl-api-key:ro

services:
  migrate:
    environment:
      <<: *production-env

  bootstrap-admin:
    environment:
      <<: *production-env

  capability-publisher:
    environment:
      <<: *production-mail-env

  profile-preflight:
    environment:
      <<: *provider-env
    volumes: *provider-secrets

  language-refresh:
    environment:
      <<: *provider-env
    volumes: *provider-secrets

  translation-worker:
    environment:
      <<: *provider-env
    volumes: *provider-secrets

  spool-drainer:
    environment:
      <<: *production-env

  control-worker-1:
    environment:
      <<: *production-mail-env

  control-worker-2:
    environment:
      <<: *production-mail-env

  web:
    environment:
      <<: *production-mail-env

  provider-benchmark:
    environment:
      <<: *provider-env
      APP_ENV: benchmark
    volumes: *provider-secrets
